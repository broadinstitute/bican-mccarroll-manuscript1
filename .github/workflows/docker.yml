# based on:
# https://github.com/broadinstitute/Drop-seq/blob/9e97d80aa96e43b58a5da852ec9e18e885c69ee9/.github/workflows/docker-drop-seq_reusable.yaml
# https://github.com/broadinstitute/Drop-seq/blob/9e97d80aa96e43b58a5da852ec9e18e885c69ee9/.github/workflows/docker-drop-seq_r.yaml
name: Docker

env:
  REGISTRY: 'quay.io'
  IMAGE_NAME: 'broadinstitute/bican-mccarroll-manuscript1'
  DOCKERFILE: 'Dockerfile'

on:
  push:
    branches: [ "main" ]
    # Publish semver tags as releases.
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ "main" ]
    paths:
      - '.github/workflows/docker.yml'
      - 'src/docker/**'
      - 'src/python/**'
      - 'src/R/**'
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # Set up BuildKit Docker container builder to be able to build
      # multi-platform images and export cache
      # https://github.com/docker/setup-buildx-action
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Get source version from the git log.
      # Do not push pull requests or pushes to master branch.
      - name: Build variables
        id: build-variables
        run: |
          echo "srcversion=$(git log -1 --date=short --pretty=format:"%ad_%h")" >> $GITHUB_OUTPUT
          echo "docker_current=${{
            github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/master'
          }}" >> $GITHUB_OUTPUT
          echo "docker_push=${{ !(
            github.event_name == 'pull_request' ||
            (github.event_name == 'push' && github.ref == 'refs/heads/master')
          ) }}" >> $GITHUB_OUTPUT

      # Login against a Docker registry except on PR
      # https://github.com/docker/login-action
      - name: Log into registry ${{ env.REGISTRY }}
        if: steps.build-variables.outputs.docker_push == 'true'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      # Extract metadata (tags, labels) for Docker
      # https://github.com/docker/metadata-action
      - name: Extract Docker metadata
        id: docker-metadata
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=${{ steps.build-variables.outputs.srcversion }}
            type=raw,value=current,enable=${{ steps.build-variables.outputs.docker_current }}

      # Build and push Docker image with Buildx (don't push on PR)
      # https://github.com/docker/build-push-action
      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v7
        with:
          file: ${{ env.DOCKERFILE }}
          context: .
          push: ${{ steps.build-variables.outputs.docker_push }}
          tags: ${{ steps.docker-metadata.outputs.tags }}
          labels: ${{ steps.docker-metadata.outputs.labels }}
          build-args: |
            SRCVERSION=${{ steps.build-variables.outputs.srcversion }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Stop buildx from pushing provenance files for our images.
          # https://docs.docker.com/build/ci/github-actions/attestations/#default-provenance
          # https://github.com/docker/setup-buildx-action/issues/187#issuecomment-1398199592
          provenance: false
